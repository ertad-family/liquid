[project]
name = "liquid-mcp"
version = "0.1.0"
description = "Self-hosted MCP server for Liquid — connect your agent to any HTTP API on the fly."
readme = "README.md"
license = "AGPL-3.0-only"
requires-python = ">=3.12"
keywords = ["mcp", "mcp-server", "model-context-protocol", "api", "agents", "llm"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = ["liquid-api[mcp]>=0.36.1"]

[project.scripts]
liquid-mcp = "liquid_mcp:main"

[project.urls]
Homepage = "https://github.com/ertad-family/liquid"
Repository = "https://github.com/ertad-family/liquid"
Issues = "https://github.com/ertad-family/liquid/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/liquid_mcp"]
